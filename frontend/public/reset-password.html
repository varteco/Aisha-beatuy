<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Aisha Beauty</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f5f5f5; font-family: 'Roboto', sans-serif; }
        .reset-wrapper {
            min-height: calc(100vh - 200px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .reset-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .reset-container h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        .reset-container p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .reset-container input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .reset-container input:focus { border-color: #FFD700; }
        .reset-container .btn-reset {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #FFD700;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .reset-container .btn-reset:hover { opacity: 0.9; }
        .reset-container .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 16px; font-size: 14px; display: none; }
        .message.success { color: #2e7d32; }
        .message.error { color: #c62828; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #FFD700; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Aisha Beauty</a>
        </div>
    </nav>

    <div class="reset-wrapper">
        <div class="reset-container">
            <h1>Reset Your Password</h1>
            <p>Enter your new password below.</p>
            <form id="resetForm">
                <input type="password" id="newPassword" placeholder="New password (min 6 characters)" minlength="6" required>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6" required>
                <button type="submit" class="btn-reset" id="resetBtn">
                    <span id="resetBtnText"><i class="fas fa-key"></i> Reset Password</span>
                </button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('message').textContent = 'Invalid or missing reset token.';
            document.getElementById('message').className = 'message error';
            document.getElementById('message').style.display = 'block';
            document.getElementById('resetBtn').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('message');
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');

            if (newPassword !== confirmPassword) {
                message.textContent = 'Passwords do not match.';
                message.className = 'message error';
                message.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                message.textContent = 'Password must be at least 6 characters.';
                message.className = 'message error';
                message.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const res = await fetch('https://aisha-beatuy.onrender.com/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    message.textContent = 'Password reset successful! Redirecting to login...';
                    message.className = 'message success';
                    message.style.display = 'block';
                    setTimeout(() => { window.location.href = '/cart-login.html'; }, 2500);
                } else {
                    message.textContent = data.message || 'Failed to reset password.';
                    message.className = 'message error';
                    message.style.display = 'block';
                    btn.disabled = false;
                    btnText.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                }
            } catch (err) {
                message.textContent = 'Connection error. Please try again.';
                message.className = 'message error';
                message.style.display = 'block';
                btn.disabled = false;
                btnText.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });
    </script>

    <script src="js/language.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
