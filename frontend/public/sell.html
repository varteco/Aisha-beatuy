<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell on Aisha Beauty</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #FFD700; --black: #000; --dark: #333; --light: #f5f5f5; --white: #fff; }
    body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background: var(--light); }
    .sell-wrapper { min-height: calc(100vh - 200px); display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
    .sell-container { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 520px; width: 100%; }
    .sell-container h1 { text-align: center; margin-bottom: 8px; font-size: 26px; }
    .sell-container .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
    .sell-container .form-group { margin-bottom: 16px; }
    .sell-container label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--dark); }
    .sell-container input, .sell-container select, .sell-container textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .sell-container textarea { resize: vertical; min-height: 100px; }
    .sell-container .btn-submit { width: 100%; padding: 14px; background: var(--black); color: var(--primary); border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .sell-container .btn-submit:hover { background: #222; }
    .success-msg { display: none; text-align: center; padding: 20px; background: #e8f5e9; color: #2e7d32; border-radius: 8px; margin-top: 16px; font-weight: 600; }
    .success-msg i { font-size: 40px; display: block; margin-bottom: 10px; }
    .nav-left { display: flex; align-items: center; flex-shrink: 0; }
    .nav-left .logo { display: flex; align-items: center; line-height: 1; }
    .nav-left .logo img { display: block; }
    .nav-right { display: flex; align-items: center; flex-shrink: 0; }
    .cart-icon-nav { position: relative; color: #fff; font-size: 22px; padding: 8px; }
    .cart-icon-nav .cart-badge { position: absolute; top: -2px; right: -6px; background: #FFD700; color: #000; font-size: 11px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .nav-links-main { flex: 1; justify-content: center; }
  </style>
</head>
<body>

<div class="top-header">
  <div class="container">
    <div class="top-header-left">
      <a href="sell.html">Sell on Aisha Beauty</a>
      <a href="sell.html">Become a Supplier</a>
      <a href="#">Help Center</a>
    </div>
    <div class="top-header-right">
      <a href="cart-login.html" id="user-icon-top"><i class="fas fa-user"></i> <span>Login</span></a>
      <a href="/profile" id="user-menu-top" style="display:none;" class="user-logged-in">
        <i class="fas fa-user-circle"></i> <span id="user-name-top"></span>
      </a>
    </div>
  </div>
</div>

<nav class="main-nav">
  <div class="container">
    <div class="nav-main">
      <div class="nav-left">
        <a href="/" class="logo"><img src="images/LOGO.png" alt="Aisha Beauty" height="50"></a>
      </div>
      <ul class="nav-links-main">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/categories">Categories</a></li>
      </ul>
      <div class="nav-right">
        <a href="cart.html" class="cart-icon-nav">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-badge" class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="sell-wrapper">
  <div class="sell-container">
    <h1>Sell on Aisha Beauty</h1>
    <p class="subtitle">Fill out the form and our team will get back to you within 24 hours.</p>

    <form id="sellForm">
      <div class="form-group">
        <label>I want to *</label>
        <select id="requestType" required>
          <option value="sell">Sell on Aisha Beauty</option>
          <option value="supplier">Become a Supplier</option>
        </select>
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Phone *</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label>Business / Brand Name</label>
        <input type="text" id="businessName" placeholder="Enter your business or brand name">
      </div>

      <div class="form-group">
        <label>Business Type</label>
        <select id="businessType">
          <option value="">Select...</option>
          <option value="individual">Individual Seller</option>
          <option value="brand">Brand Owner</option>
          <option value="distributor">Distributor / Wholesaler</option>
          <option value="manufacturer">Manufacturer</option>
        </select>
      </div>

      <div class="form-group">
        <label>Country</label>
        <input type="text" id="country" placeholder="Your country">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message" placeholder="Tell us about your products, experience, or any questions..."></textarea>
      </div>

      <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Submit Request</button>
    </form>

    <div class="success-msg" id="successMsg">
      <i class="fas fa-check-circle"></i>
      <span>Thank you! We will contact you within 24 hours.</span>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/amazon-enhance.js"></script>
<script>
  var API_BASE = '/api';

  function updateCartBadge() {
    var cart = JSON.parse(localStorage.getItem('cart')) || [];
    var count = cart.reduce(function(sum, item) { return sum + (item.qty || 1); }, 0);
    var el = document.getElementById('cart-badge');
    if (el) el.textContent = count;
  }
  updateCartBadge();

  var token = localStorage.getItem('customerToken');
  if (!token) {
    window.location.href = 'cart-login.html';
  }

  var storedUser = localStorage.getItem('customerUser');
  if (storedUser) {
    try {
      var user = JSON.parse(storedUser);
      document.getElementById('fullName').value = user.name || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('phone').value = user.phone || '';
    } catch (e) {}
  }

  document.getElementById('sellForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.querySelector('.btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

    var data = {
      requestType: document.getElementById('requestType').value,
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      businessName: document.getElementById('businessName').value,
      businessType: document.getElementById('businessType').value,
      country: document.getElementById('country').value,
      message: document.getElementById('message').value,
    };

    try {
      var res = await fetch(API_BASE + '/sell', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify(data),
      });
      var result = await res.json();
      if (res.ok) {
        document.getElementById('sellForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        alert(result.message || 'Failed to submit request');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
      }
    } catch (err) {
      alert('Network error. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
    }
  });
</script>
</body>
</html>
